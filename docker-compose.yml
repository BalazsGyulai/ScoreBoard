services:
  db:
    image: postgres:16-alpine
    container_name: homegame-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: homegame
      POSTGRES_USER: homegame
      POSTGRES_PASSWORD: homegame
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./apps/api/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homegame -d homegame"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: homegame-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://homegame:homegame@db:5432/homegame
      JWT_SECRET: change-this-secret
      JWT_ACCESS_EXPIRY_MINUTES: "15"
      JWT_REFRESH_EXPIRY_DAYS: "7"
      PORT: "8080"
      RUST_LOG: info
    ports:
      - "8080:8080"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        API_URL: http://api:8080
    container_name: homegame-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      API_URL: http://api:8080
      NODE_ENV: production
      PORT: "3000"
    ports:
      - "3000:3000"

volumes:
  pgdata:
